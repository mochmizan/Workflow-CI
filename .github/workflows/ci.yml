name: CI - Train, Save & Dockerize Model

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      # 3. Install semua dependencies
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn matplotlib seaborn

      # Copy data (simulasi karena ini mono-repo style)
      - name: Setup Data
        run: |
          cp -r ../Eksperimen_SML_Moch-Mizan-Ghodafail/preprocessing/cancer_preprocessing MLProject/ || echo "Salin data gagal"

      # 4. Jalankan MLflow Project (--env-manager=local)
      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . -e main --env-manager=local

      # 6. Verifikasi model artifact
      - name: Verify Model Artifact
        run: |
          echo "=== Model artifact contents ==="
          ls -lh MLProject/model_artifact/
          cat MLProject/run_id.txt 2>/dev/null || echo "run_id.txt not found"

      # 7. Upload model sebagai GitHub Actions Artifact
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cancer-model-${{ github.run_number }}
          path: |
            MLProject/model_artifact/
            MLProject/run_id.txt
            MLProject/confusion_matrix.png
            MLProject/feature_importance.png
          retention-days: 90

      # 8. Commit model artifact ke repository
      - name: Commit Model to Repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add MLProject/model_artifact/ || true
          git add MLProject/run_id.txt || true
          git add MLProject/confusion_matrix.png || true
          git add MLProject/feature_importance.png || true
          git diff --staged --quiet || git commit -m "ci: update breast cancer model artifact [run #${{ github.run_number }}]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. Login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 10. Build Docker Image
      - name: Build Docker Image
        run: |
          cat > Dockerfile << 'EOF'
          FROM python:3.12-slim
          WORKDIR /app
          RUN pip install --no-cache-dir mlflow==2.19.0 scikit-learn pandas numpy
          COPY MLProject/model_artifact/ /app/model/
          EXPOSE 5001
          CMD ["mlflow", "models", "serve", "-m", "/app/model", "-h", "0.0.0.0", "-p", "5001", "--no-conda"]
          EOF
          docker build -t sansbo/breast-cancer-classifier:latest .

      # 11. Tag image
      - name: Tag Docker Image
        run: |
          docker tag sansbo/breast-cancer-classifier:latest \
                     sansbo/breast-cancer-classifier:run-${{ github.run_number }}

      # 12. Push ke Docker Hub
      - name: Push to Docker Hub
        run: |
          docker push sansbo/breast-cancer-classifier:latest
          docker push sansbo/breast-cancer-classifier:run-${{ github.run_number }}
          echo "Docker image pushed: sansbo/breast-cancer-classifier:latest"